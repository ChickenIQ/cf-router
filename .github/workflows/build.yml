name: build

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  NAME: "${{ github.event.repository.name }}"
  TAG: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare environment
        id: vars
        run: |
          echo "image=${REGISTRY,,}/${NAME,,}:${TAG,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.vars.outputs.image }}-${{ matrix.arch }}

  merge:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      packages: write
    steps:
      - name: Prepare environment
        id: vars
        run: |
          echo "image=${REGISTRY,,}/${NAME,,}:${TAG,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t \
            "${{ steps.vars.outputs.image }}" \
            "${{ steps.vars.outputs.image }}-amd64" \
            "${{ steps.vars.outputs.image }}-arm64"
