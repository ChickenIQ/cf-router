name: build

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_TAG: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare environment
        id: prep
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "image_full=${IMAGE_REGISTRY,,}/${IMAGE_NAME,,}:${IMAGE_TAG,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.prep.outputs.image_full }}-${{ matrix.arch }}

  merge:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      packages: write
    steps:
      - name: Prepare environment
        id: prep
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"
          echo "image_full=${IMAGE_REGISTRY,,}/${IMAGE_NAME,,}:${IMAGE_TAG,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t \
            "${{ steps.prep.outputs.image_full }}" \
            "${{ steps.prep.outputs.image_full }}-amd64" \
            "${{ steps.prep.outputs.image_full }}-arm64"